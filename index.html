<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>通勤ラッシュ椅子取りゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f0f0f0;
}

h1{
margin-top:20px;
}

#train{
display:grid;
grid-template-columns:repeat(5,70px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.seat{
width:70px;
height:70px;
background:#8fd18f;
border:3px solid #333;
border-radius:10px;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.taken{
background:#ff7b7b;
cursor:not-allowed;
}

.player{
background:#4da6ff;
}

#message{
font-size:20px;
margin-top:20px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
}

</style>
</head>

<body>

<h1>🚃 通勤ラッシュ椅子取りゲーム</h1>
<p>早くタップして席を確保！</p>

<div id="train"></div>

<div id="message"></div>

<button onclick="startGame()">ゲーム開始</button>

<script>

const seatCount=10
let seats=[]
let npcInterval

function createSeats(){

const train=document.getElementById("train")
train.innerHTML=""

seats=[]

for(let i=0;i<seatCount;i++){

let seat=document.createElement("div")
seat.className="seat"

seat.onclick=function(){

if(seat.classList.contains("taken")) return

seat.classList.add("taken","player")
seat.textContent="😀"

endGame("席ゲット！あなたの勝ち！")

}

train.appendChild(seat)
seats.push(seat)

}

}

function npcSit(){

let emptySeats=seats.filter(s=>!s.classList.contains("taken"))

if(emptySeats.length===0){

endGame("満席…座れなかった！")

return

}

let seat=emptySeats[Math.floor(Math.random()*emptySeats.length)]

seat.classList.add("taken")
seat.textContent="🧍"

}

function startGame(){

createSeats()

document.getElementById("message").textContent="席を急いでタップ！"

clearInterval(npcInterval)

npcInterval=setInterval(npcSit,800)

}

function endGame(text){

clearInterval(npcInterval)

document.getElementById("message").textContent=text

}

createSeats()

</script>

</body>
</html>
