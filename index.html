<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>椅子取りゲーム（対戦版）</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f0f0f0;
}

#train{
display:grid;
grid-template-columns:repeat(3,80px);
gap:12px;
justify-content:center;
margin-top:30px;
}

.seat{
width:80px;
height:80px;
background:#8fd18f;
border:3px solid #333;
border-radius:12px;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.taken{
background:#ff7b7b;
cursor:not-allowed;
}

.player{
background:#4da6ff;
}

#info{
margin-top:20px;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
}
</style>
</head>

<body>

<h1>🚃 椅子取り対戦ゲーム</h1>
<p>先に5席取った方が勝ち！</p>

<div id="train"></div>

<div id="info"></div>

<button onclick="startGame()">ゲーム開始</button>

<script>

const seatCount = 9
const winCount = 5

let seats = []
let playerScore = 0
let npcScore = 0
let npcInterval

function createSeats(){

const train=document.getElementById("train")
train.innerHTML=""
seats=[]

for(let i=0;i<seatCount;i++){

let seat=document.createElement("div")
seat.className="seat"

seat.onclick=function(){

if(seat.classList.contains("taken")) return

seat.classList.add("taken","player")
seat.textContent="😀"

playerScore++
updateInfo()

checkWin()

}

train.appendChild(seat)
seats.push(seat)

}

}

function npcSit(){

let emptySeats=seats.filter(s=>!s.classList.contains("taken"))

if(emptySeats.length===0){
checkWin()
return
}

let seat=emptySeats[Math.floor(Math.random()*emptySeats.length)]

seat.classList.add("taken")
seat.textContent="🧍"

npcScore++
updateInfo()

checkWin()

}

function updateInfo(){
document.getElementById("info").textContent =
`あなた：${playerScore}席　NPC：${npcScore}席`
}

function checkWin(){

if(playerScore >= winCount){
endGame("🎉 あなたの勝ち！")
}

else if(npcScore >= winCount){
endGame("😢 NPCの勝ち…")
}

}

function startGame(){

playerScore = 0
npcScore = 0

createSeats()
updateInfo()

clearInterval(npcInterval)
npcInterval = setInterval(npcSit, 900)

}

function endGame(text){

clearInterval(npcInterval)

document.getElementById("info").textContent += "　" + text

}

createSeats()
updateInfo()

</script>

</body>
</html>
